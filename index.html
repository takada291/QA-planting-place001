        .message { margin-bottom: 15px; padding: 12px 15px; border-radius: 8px; line-height: 1.6; font-size: 0.95rem; }
        .bot-msg { background: #f8f9fa; border-left: 4px solid #27ae60; }
        button { width: 100%; padding: 15px; background: #27ae60; color: white; border: none; border-radius: 4px; font-size: 1.1rem; font-weight: bold; cursor: pointer; transition: background 0.2s; }
        button:hover { background: #2ecc71; }
        button:disabled { background: #95a5a6; cursor: not-allowed; }
    </style>
</head>

    <h1>福井県 適地適木QAマップ（AI判定）</h1>

    <div class="panel">
        <div class="form-group">
            <label for="apiKey">Gemini APIキー:</label>
            <input type="password" id="apiKey" placeholder="AI Studioで取得したAPIキーを入力">
        </div>
    </div>

    <div class="panel">
        <label>1. 地図上で対象の山林をタップ（クリック）してください</label>
        <div id="map"></div>
    </div>

    <div class="panel">
        <label>2. 取得した位置情報</label>
        <div id="location-info">
            地図をタップすると、ここに標高と最寄りの調査データが表示されます。
        </div>

        <div class="form-group">
            <label for="terrainSelect">3. 詳細な地形を選択してください</label>
            <select id="terrainSelect">
                <option value="">-- 地形を選択 --</option>
                <option value="山頂・尾根沿い（風当たりが強い・乾燥しやすい）">山頂・尾根沿い（風当たりが強い・乾燥しやすい）</option>
                <option value="斜面上部（やや乾燥気味）">斜面上部（やや乾燥気味）</option>
                <option value="斜面中腹（なだらか）">斜面中腹（なだらか）</option>
                <option value="斜面下部・谷沿い（湿り気がある・土が深い）">斜面下部・谷沿い（湿り気がある・土が深い）</option>
            </select>
        </div>

        <button id="askBtn" onclick="askGemini()" disabled>AIに適地適木を判定させる</button>
    </div>

    <div class="panel">
        <label>判定結果（AIからの提案）</label>
        <div class="chat-box" id="chatBox">
            <div class="message bot-msg">ここに判定結果が表示されます。まずは地図をタップしてください。</div>
        </div>
    </div>

            { id: "13", region: "若狭地区１", lat: 35.60766, lon: 136.03460, desc: "140m/斜面下部 | BD(d)型 | アオキ、ウラジロ等" },
            { id: "20", region: "若狭地区１", lat: 35.66999, lon: 136.09456, desc: "190m/頂上付近 | BD型 | アカマツ、タモ等" },
            { id: "33", region: "若狭地区１", lat: 35.61767, lon: 135.85247, desc: "240m/斜面上部 | Er型 | ミズナラ、リョウブ等" }
        ];

        let systemPrompt = "";
        let currentData = null; 
        let marker = null; 
        let nearestMarker = null; // 最寄り地点の赤ピン用

        // 赤色ピンのアイコン設定
        const redIcon = new L.Icon({
            iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-red.png',
            shadowUrl: 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/images/marker-shadow.png',
            iconSize: [25, 41],
            iconAnchor: [12, 41],
            popupAnchor: [1, -34],
            shadowSize: [41, 41]
        });

        // --- 地図の初期化 ---
        const map = L.map('map').setView([36.065, 136.221], 10); 
        L.tileLayer('https://cyberjapandata.gsi.go.jp/xyz/std/{z}/{x}/{y}.png', {
            attribution: "<a href='https://maps.gsi.go.jp/development/ichiran.html' target='_blank'>国土地理院</a>"
        }).addTo(map);
        
        // --- マークダウンの読み込み ---
        window.onload = async () => {
            try {
                // ファイル名を指定のMDファイル名に合わせる
                const response = await fetch('./適地適木_260317.md');
                if (response.ok) systemPrompt = await response.text();
            } catch (error) {
                console.error("Markdown読み込みエラー:", error);
            }
        };

        function getNearestPoint(lat, lon) {
            let nearest = null;
            let minDist = Infinity;
            surveyData.forEach(point => {
                const dLat = point.lat - lat;
                const dLon = point.lon - lon;
                const dist = dLat * dLat + dLon * dLon;
                if (dist < minDist) {
                    minDist = dist;
                    nearest = point;
                }
            });
            return nearest;
        }

        map.on('click', async function(e) {
            const lat = e.latlng.lat;
            const lon = e.latlng.lng;

            if(marker) map.removeLayer(marker);
            marker = L.marker([lat, lon]).addTo(map);

            document.getElementById('location-info').innerHTML = "標高データを取得中...";
            
            try {
                const url = `https://cyberjapandata2.gsi.go.jp/general/dem/scripts/getelevation.php?lon=${lon}&lat=${lat}&outtype=JSON`;
                const res = await fetch(url);
                const data = await res.json();
                const elevation = data.elevation === "----" ? "取得不可" : Math.round(data.elevation) + "m";

                const nearest = getNearestPoint(lat, lon);
                currentData = { lat, lon, elevation, nearest };

                // 最寄り地点に赤色ピンを立てる処理
                if(nearestMarker) map.removeLayer(nearestMarker);
                if(nearest && nearest.lat && nearest.lon) {
                    nearestMarker = L.marker([nearest.lat, nearest.lon], {icon: redIcon}).addTo(map)
                        .bindPopup(`<b>最寄り調査データ: No.${nearest.id}</b><br>${nearest.region}`);
                }

                document.getElementById('location-info').innerHTML = `
                    <strong>タップした位置:</strong> 標高 ${elevation} (緯度:${lat.toFixed(4)}, 経度:${lon.toFixed(4)})<br>
                    <strong>最寄りの調査データ:</strong> ${nearest.region} No.${nearest.id} <br>
                    <span style="color:#666;">（環境基準: ${nearest.desc}）</span>
                `;
                document.getElementById('askBtn').disabled = false;
            } catch (error) {
                document.getElementById('location-info').innerHTML = "位置情報の取得に失敗しました。";
                console.error("標高APIエラー:", error);
            }
        });

        async function askGemini() {
            const apiKey = document.getElementById('apiKey').value;
            const terrain = document.getElementById('terrainSelect').value;
            const chatBox = document.getElementById('chatBox');
            const askBtn = document.getElementById('askBtn');

            if (!apiKey) { alert("APIキーを入力してください。"); return; }
            if (!currentData) { alert("地図をタップして場所を指定してください。"); return; }
            if (!terrain) { alert("地形を選択してください。"); return; }

            askBtn.disabled = true;
            askBtn.innerText = "AIが分析中...";
            chatBox.innerHTML = '<div class="message bot-msg">データベースを照合し、判定しています...</div>';

            const userPrompt = `
ユーザーが地図上で以下の条件を指定しました。この条件に最も適した樹種と、広葉樹等を含めた多様な森づくりの提案をしてください。

【指定された現地の条件】
- 標高: ${currentData.elevation}
- 地形: ${terrain}
- 最も近い調査データ: ${currentData.nearest.region} の No.${currentData.nearest.id} (環境: ${currentData.nearest.desc})
            `;

            const fullPrompt = `${systemPrompt}\n\n${userPrompt}`;

            try {
                const apiUrl = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`;
                const response = await fetch(apiUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: fullPrompt }] }] })
                });

               if (!response.ok) {
                const errorData = await response.json();
                throw new Error(`APIエラー: ${errorData.error.message}`);
                }
                const data = await response.json();
                const botReply = data.candidates[0].content.parts[0].text;
                
                chatBox.innerHTML = `<div class="message bot-msg">${botReply.replace(/\n/g, '<br>')}</div>`;

            } catch (error) {
                chatBox.innerHTML = `<div class="message bot-msg" style="color:red;">エラー: ${error.message}</div>`;
            } finally {
                askBtn.disabled = false;
                askBtn.innerText = "AIに適地適木を判定させる";
            }
        }
    </script>
</body>
</html>
